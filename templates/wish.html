<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#050005;}
#mainCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;}
#photoModal{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.9);align-items:center;justify-content:center;
  cursor:pointer;
}
#photoModal.show{display:flex;}
#photoModal img{
  max-width:min(88vw,640px);max-height:85vh;
  border-radius:18px;border:3px solid #e91e8c;
  box-shadow:0 0 60px rgba(233,30,140,.8),0 0 120px rgba(233,30,140,.3);
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.2) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
</style>
</head>
<body>
<canvas id="mainCanvas"></canvas>
<div id="photoModal" onclick="this.classList.remove('show')">
  <img id="modalImg" src="" alt="Memory"/>
</div>
<script>
(function(){
try {

var PHOTOS    = {{ photos_json|safe }};
var MESSAGE   = {{ message|tojson }};
var RECIPIENT = {{ recipient|tojson }};

var canvas = document.getElementById('mainCanvas');
var ctx    = canvas.getContext('2d');
var W, H;

// ── Layout constants (recalculated on resize) ─────────────────────────────────
var ROOT_X, ROOT_Y, TRUNK_L;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ROOT_X  = W * 0.5;
  ROOT_Y  = H * 0.80;          // tree base at 80% — title has room at top
  TRUNK_L = Math.min(H * 0.20, W * 0.18);  // shorter trunk = smaller tree
  needRebuild = true;
}

var needRebuild = true;
resize();
window.addEventListener('resize', resize);

// ── Helpers ───────────────────────────────────────────────────────────────────
function rand(a,b){ return a + Math.random()*(b-a); }
function lerp(a,b,t){ return a + (b-a)*t; }
function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }

// Polyfill roundRect
function rr(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── Stars ─────────────────────────────────────────────────────────────────────
var stars = [];
function makeStars(){
  stars = [];
  for(var i=0;i<140;i++){
    stars.push({
      x:rand(0,W), y:rand(0,H*0.85),
      r:rand(0.5,2), a:rand(0.3,1),
      speed:rand(1.5,4.5), phase:rand(0,Math.PI*2)
    });
  }
}
makeStars();
function drawStars(frame){
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    var alpha = s.a * (0.4 + 0.6*Math.abs(Math.sin(frame*0.008*s.speed+s.phase)));
    ctx.save();ctx.globalAlpha=alpha;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();ctx.restore();
  }
}

// ── Floating petals ───────────────────────────────────────────────────────────
var petals = [];
function makePetals(){
  petals=[];
  for(var i=0;i<35;i++) petals.push(newPetal(true));
}
function newPetal(init){
  return {
    x: rand(0,W),
    y: init ? rand(-H,0) : rand(-40,-5),
    vy: rand(0.4,1.2),
    vx: rand(-0.4,0.4),
    size: rand(3,7),
    rot: rand(0,Math.PI*2),
    rotSpeed: rand(-0.03,0.03),
    alpha: rand(0.3,0.7),
    hue: rand(310,360),
  };
}
function updatePetals(){
  for(var i=0;i<petals.length;i++){
    var p=petals[i];
    p.x += p.vx + Math.sin(p.y*0.012)*0.3;
    p.y += p.vy;
    p.rot += p.rotSpeed;
    if(p.y > H+20){ petals[i]=newPetal(false); }
  }
}
function drawPetals(){
  for(var i=0;i<petals.length;i++){
    var p=petals[i];
    ctx.save();ctx.globalAlpha=p.alpha*titleAlpha;
    ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    // small heart petal
    var s=p.size;
    ctx.beginPath();
    ctx.moveTo(0,-s*0.4);
    ctx.bezierCurveTo(s*0.6,-s,s*1.2,s*0.2,0,s*0.9);
    ctx.bezierCurveTo(-s*1.2,s*0.2,-s*0.6,-s,0,-s*0.4);
    ctx.fillStyle='hsl('+p.hue+',90%,75%)';
    ctx.fill();ctx.restore();
  }
}
makePetals();

// ── Dust / build particles ────────────────────────────────────────────────────
var dustParticles = [];
for(var di=0;di<200;di++){
  dustParticles.push({
    x:rand(0,W), y:rand(-H,0),
    vy:rand(0.3,1.4), vx:rand(-0.25,0.25),
    r:rand(0.8,2.5), a:rand(0.3,0.8),
    hue:rand(290,360),
    settleY:rand(H*0.1,H*0.98),
    settled:false, life:1,
  });
}
function updateDust(){
  for(var i=0;i<dustParticles.length;i++){
    var d=dustParticles[i];
    if(d.settled){ d.life-=0.006; if(d.life<=0) resetDust(d,false); continue; }
    d.x += d.vx + Math.sin(d.y*0.015)*0.2;
    d.y += d.vy;
    if(d.y>d.settleY) d.settled=true;
    if(d.y>H+10) resetDust(d,false);
  }
}
function resetDust(d,init){
  d.x=rand(0,W); d.y=init?rand(-H,0):rand(-50,-5);
  d.vy=rand(0.3,1.4); d.vx=rand(-0.25,0.25);
  d.settled=false; d.life=1; d.settleY=rand(H*0.1,H*0.98);
}
function drawDust(){
  for(var i=0;i<dustParticles.length;i++){
    var d=dustParticles[i];
    ctx.save();
    ctx.globalAlpha=(d.settled?d.a*d.life:d.a*0.5)*clamp(buildProgress*3,0,1);
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    var col='hsl('+d.hue+',75%,70%)';
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=3;
    ctx.fill();ctx.restore();
  }
}

// ── Scene phases ──────────────────────────────────────────────────────────────
// 0-0.25: title fades in
// 0.25-0.65: tree grows (branches, then leaves)
// 0.65-1.0: roots grow
var buildProgress = 0;
var titleAlpha    = 0;
var BUILD_SPEED   = 0.0018;

// ── Tree ──────────────────────────────────────────────────────────────────────
var branches=[], leaves=[];
var MAX_DEPTH = 5;  // reduced depth = smaller, cleaner tree

function buildTree(){
  branches=[]; leaves=[];

  function grow(x,y,angle,len,depth){
    if(depth>MAX_DEPTH||len<8) return;
    var rad=angle*Math.PI/180;
    var x2=x+Math.cos(rad)*len;
    var y2=y-Math.sin(rad)*len;
    var phase = (depth-1)/(MAX_DEPTH); // 0=trunk, 1=tips
    branches.push({x1:x,y1:y,x2:x2,y2:y2,depth:depth,
      revealStart: 0.25 + phase*0.3,
      revealEnd:   0.30 + phase*0.3 + 0.12});
    if(depth===MAX_DEPTH){
      leaves.push({
        cx:x2, cy:y2, baseAngle:angle,
        phase:rand(0,Math.PI*2),
        // Smaller leaves so heart shape is clear
        size: Math.min(W,H)*0.018 + rand(0,Math.min(W,H)*0.007),
        swayAmp:rand(3,8), swaySpeed:rand(0.5,1.2),
        revealStart:0.52+rand(0,0.18),
        hue: [338,352,318,348,305,332][Math.floor(rand(0,6))],
      });
      return;
    }
    var spread = lerp(28,12,depth/MAX_DEPTH);
    var lm = rand(0.70,0.80);
    grow(x2,y2,angle+spread,len*lm,depth+1);
    grow(x2,y2,angle-spread,len*lm,depth+1);
    if(depth<2) grow(x2,y2,angle+spread*0.3,len*lm*0.85,depth+2);
  }

  grow(ROOT_X, ROOT_Y, 90, TRUNK_L, 0);
  // A couple side branches for fullness
  for(var i=0;i<3;i++){
    var by = ROOT_Y - TRUNK_L*(0.4+Math.random()*0.3);
    var side = Math.random()<.5?1:-1;
    grow(ROOT_X, by, 90+side*rand(20,42), TRUNK_L*rand(0.28,0.40), 2);
  }
  needRebuild = false;
}

// ── Roots ─────────────────────────────────────────────────────────────────────
var roots = [];

// Build word list: "Happy Birthday [Name]" then message
var nameWords = ['Happy','Birthday'];
if(RECIPIENT && RECIPIENT.trim()) nameWords.push(RECIPIENT.trim());
var msgWords = MESSAGE.trim() ? MESSAGE.trim().split(/\s+/).slice(0,17) : [];
// deduplicate: remove msg words that clash with nameWords
var allWords = nameWords.concat(msgWords).slice(0,20);

function buildRoots(){
  roots=[];
  if(!allWords.length) return;

  var rootBaseY = ROOT_Y + H*0.008;
  // Split into left/right groups — left gets even indices (0,2,4...), right odd
  var leftW=[], rightW=[];
  for(var i=0;i<allWords.length;i++){
    if(i%2===0) leftW.push(allWords[i]);
    else rightW.push(allWords[i]);
  }

  // Max spread based on word count
  var maxCount = Math.max(leftW.length, rightW.length);
  var spread   = Math.min(W*0.42, W*0.08*maxCount);

  // Build in reading order: left[0],right[0],left[1],right[1]...
  var idx=0;
  for(var i=0;i<maxCount;i++){
    if(i<leftW.length){
      addRoot(leftW[i],-1,i,maxCount,spread,rootBaseY,idx++);
    }
    if(i<rightW.length){
      addRoot(rightW[i],1,i,maxCount,spread,rootBaseY,idx++);
    }
  }
}

function addRoot(word,side,rank,total,spread,baseY,delayIdx){
  var frac   = (rank+1)/(total+0.5);
  var ex     = ROOT_X + side*spread*frac;
  var ey     = baseY + H*0.072 + rank*H*0.018;
  var cx1    = ROOT_X + (ex-ROOT_X)*0.2 + Math.sin(delayIdx*1.3)*W*0.03;
  var cy1    = baseY + H*0.025;
  var cx2    = ROOT_X + (ex-ROOT_X)*0.75 + Math.cos(delayIdx*2.1)*W*0.025;
  var cy2    = ey - H*0.012;
  roots.push({
    word:word, sx:ROOT_X, sy:baseY, ex:ex, ey:ey,
    cx1:cx1, cy1:cy1, cx2:cx2, cy2:cy2,
    progress:0, speed:0.0035+rand(0,0.002),
    done:false, textAlpha:0,
    delay: delayIdx*45,   // staggered
    revealAt: 0.68,       // roots start after tree appears
  });
}
buildRoots();

function bezPt(r,t){
  var mt=1-t;
  return {
    x: mt*mt*mt*r.sx + 3*mt*mt*t*r.cx1 + 3*mt*t*t*r.cx2 + t*t*t*r.ex,
    y: mt*mt*mt*r.sy + 3*mt*mt*t*r.cy1 + 3*mt*t*t*r.cy2 + t*t*t*r.ey,
  };
}

// ── Photo cycling ─────────────────────────────────────────────────────────────
function shuffle(a){
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
}
var photoQueue=[];
for(var qi=0;qi<PHOTOS.length;qi++) photoQueue.push(qi);
shuffle(photoQueue);
var qIdx=0;
var activeLeafIdx=-1, activePhoto=null, activeAlpha=0, showTimer=0;
var SHOW_DUR=220;
var firstLeafScheduled=false;

// ── Burst particles (romantic burst when photo appears) ───────────────────────
var burst=[];
function spawnBurst(x,y){
  for(var i=0;i<28;i++){
    var angle=rand(0,Math.PI*2);
    var speed=rand(1.5,5);
    burst.push({
      x:x,y:y,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2,
      life:1, decay:rand(0.018,0.035),
      size:rand(2,5), hue:rand(310,360),
    });
  }
}
function updateBurst(){
  for(var i=burst.length-1;i>=0;i--){
    var b=burst[i];
    b.x+=b.vx; b.y+=b.vy; b.vy+=0.08; b.life-=b.decay;
    if(b.life<=0) burst.splice(i,1);
  }
}
function drawBurst(){
  for(var i=0;i<burst.length;i++){
    var b=burst[i];
    ctx.save();ctx.globalAlpha=b.life*0.9;
    ctx.translate(b.x,b.y);
    var s=b.size;
    ctx.beginPath();
    ctx.moveTo(0,-s*0.4);
    ctx.bezierCurveTo(s*0.6,-s,s*1.2,s*0.2,0,s*0.9);
    ctx.bezierCurveTo(-s*1.2,s*0.2,-s*0.6,-s,0,-s*0.4);
    ctx.fillStyle='hsl('+b.hue+',90%,75%)';
    ctx.shadowColor='hsl('+b.hue+',90%,75%)';
    ctx.shadowBlur=6;
    ctx.fill();ctx.restore();
  }
}

// ── Light beam ────────────────────────────────────────────────────────────────
var lightBeam=null;
function triggerLight(leafIdx,cb){
  if(!leaves[leafIdx]){cb();return;}
  var lf=leaves[leafIdx];
  lightBeam={
    path:[
      {x:ROOT_X, y:ROOT_Y+H*0.025},
      {x:ROOT_X, y:ROOT_Y-TRUNK_L*0.3},
      {x:lerp(ROOT_X,lf.cx,0.4), y:lerp(ROOT_Y-TRUNK_L*0.3,lf.cy,0.5)},
      {x:lerp(ROOT_X,lf.cx,0.75),y:lerp(ROOT_Y-TRUNK_L*0.3,lf.cy,0.85)},
      {x:lf.cx,y:lf.cy},
    ],
    t:0, speed:0.019, cb:cb, leafIdx:leafIdx
  };
}
function lpos(path,t){
  var total=path.length-1;
  var seg=clamp(t*total,0,total-0.0001);
  var i=Math.floor(seg),f=seg-i;
  return{x:lerp(path[i].x,path[i+1].x,f),y:lerp(path[i].y,path[i+1].y,f)};
}
function drawLight(){
  if(!lightBeam) return;
  lightBeam.t+=lightBeam.speed;
  if(lightBeam.t>=1){
    var cb=lightBeam.cb;
    var li=lightBeam.leafIdx;
    lightBeam=null;
    // burst at leaf position
    if(leaves[li]) spawnBurst(leaves[li].cx, leaves[li].cy);
    cb();
    return;
  }
  var pos=lpos(lightBeam.path,lightBeam.t);
  // trail
  for(var ti=0;ti<12;ti++){
    var tt=Math.max(0,lightBeam.t-ti*0.013);
    var tp=lpos(lightBeam.path,tt);
    ctx.save();ctx.globalAlpha=(1-ti/12)*0.8;
    ctx.beginPath();ctx.arc(tp.x,tp.y,4.5-ti*0.35,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.shadowColor='#ffaaee';ctx.shadowBlur=16;
    ctx.fill();ctx.restore();
  }
  ctx.save();ctx.globalAlpha=1;
  ctx.beginPath();ctx.arc(pos.x,pos.y,8,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.shadowColor='#ff88dd';ctx.shadowBlur=35;
  ctx.fill();ctx.restore();
}

function scheduleNext(){
  if(!leaves.length||!PHOTOS.length) return;
  activeLeafIdx=Math.floor(Math.random()*leaves.length);
  var pIdx=photoQueue[qIdx%photoQueue.length];
  qIdx++;
  if(qIdx%photoQueue.length===0) shuffle(photoQueue);
  triggerLight(activeLeafIdx, function(){
    var img=new Image();
    img.src=PHOTOS[pIdx];
    img.onload=function(){activePhoto=img;activeAlpha=0;showTimer=0;};
  });
}

// ── Draw heart ────────────────────────────────────────────────────────────────
function heart(cx,cy,angle,s,col,alpha){
  ctx.save();ctx.globalAlpha=clamp(alpha,0,1);
  ctx.translate(cx,cy);ctx.rotate(angle*Math.PI/180);
  ctx.beginPath();
  ctx.moveTo(0,-s*0.45);
  ctx.bezierCurveTo(s*0.75,-s*1.15, s*1.55,s*0.25, 0,s*0.95);
  ctx.bezierCurveTo(-s*1.55,s*0.25,-s*0.75,-s*1.15, 0,-s*0.45);
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=12;
  ctx.fill();ctx.restore();
}

// ── Responsive font ───────────────────────────────────────────────────────────
function fs(base){ return clamp(W*base, 14, 60); }

// ── Root frame counter ────────────────────────────────────────────────────────
var rootFrame=0;

// ── Main loop ─────────────────────────────────────────────────────────────────
var frame=0;

function animate(){
  requestAnimationFrame(animate);
  frame++;

  if(needRebuild){ buildTree(); buildRoots(); }

  buildProgress = clamp(buildProgress + BUILD_SPEED, 0, 1);
  var bp = buildProgress;

  // Title fades in first (0→0.25)
  titleAlpha = clamp((bp-0)/0.22, 0, 1);

  // Background
  ctx.fillStyle='#050005';
  ctx.fillRect(0,0,W,H);

  // Subtle radial glow bg
  var grad=ctx.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,W*0.7);
  grad.addColorStop(0,'rgba(80,0,50,0.35)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  drawStars(frame);
  updateDust();drawDust();
  updatePetals();drawPetals();

  // ── TITLE ─────────────────────────────────────────────────────────────────────
  if(titleAlpha>0){
    ctx.save();ctx.textAlign='center';

    // Glow layer
    ctx.globalAlpha=titleAlpha*0.4;
    ctx.font='bold '+fs(0.042)+'px Cinzel,serif';
    ctx.fillStyle='#e8902a';
    ctx.shadowColor='#d4a853';ctx.shadowBlur=50;
    var title='Happy Birthday'+(RECIPIENT&&RECIPIENT.trim()?' '+RECIPIENT.trim():'');
    ctx.fillText(title,W/2,H*0.075);

    // Main
    ctx.globalAlpha=titleAlpha;
    ctx.font='bold '+fs(0.042)+'px Cinzel,serif';
    ctx.fillStyle='#f0c060';
    ctx.shadowColor='#d4a853';ctx.shadowBlur=18+Math.sin(frame*0.04)*8;
    // wrap if needed
    var mw=ctx.measureText('✦ '+title+' ✦').width;
    if(mw>W*0.86){
      ctx.font='bold '+fs(0.030)+'px Cinzel,serif';
    }
    ctx.fillText('✦ '+title+' ✦',W/2,H*0.075);

    ctx.globalAlpha=titleAlpha*0.9;
    ctx.font='italic '+fs(0.022)+'px "Dancing Script",cursive';
    ctx.fillStyle='#f48fb1';ctx.shadowColor='#c9185b';ctx.shadowBlur=12;
    ctx.fillText('A little magic, grown just for you \u2764',W/2,H*0.13);
    ctx.restore();
  }

  // ── ROOTS ─────────────────────────────────────────────────────────────────────
  if(bp>0.65){
    rootFrame++;
    var rootAlphaBase=clamp((bp-0.68)/0.15,0,1);
    for(var ri=0;ri<roots.length;ri++){
      var r=roots[ri];
      if(rootFrame<r.delay) continue;
      if(!r.done) r.progress=Math.min(1,r.progress+r.speed);
      if(r.progress>=1) r.done=true;
      var rAlpha=rootAlphaBase*clamp(r.progress*4,0,1);
      if(rAlpha<=0) continue;

      ctx.save();ctx.globalAlpha=rAlpha;
      ctx.beginPath();ctx.moveTo(r.sx,r.sy);
      for(var s=1;s<=50;s++){
        var pt=bezPt(r,(s/50)*r.progress);
        ctx.lineTo(pt.x,pt.y);
      }
      ctx.strokeStyle='#8a4e28';
      ctx.lineWidth=Math.max(1.2, 3.5*(Math.min(W,H)/800));
      ctx.lineCap='round';ctx.stroke();ctx.restore();

      if(r.progress>0.88){
        r.textAlpha=Math.min(1,(r.progress-0.88)/0.12)*rootAlphaBase;
        var ep=bezPt(r,1);
        ctx.save();ctx.globalAlpha=r.textAlpha;
        ctx.font='italic '+fs(0.020)+'px "Dancing Script",cursive';
        ctx.fillStyle='#f5c842';ctx.textAlign='center';
        ctx.shadowColor='rgba(245,200,66,.9)';ctx.shadowBlur=12;
        ctx.fillText(r.word,ep.x,ep.y+6);ctx.restore();
      }
    }
  }

  // ── BRANCHES ──────────────────────────────────────────────────────────────────
  for(var bi=0;bi<branches.length;bi++){
    var b=branches[bi];
    var ba=clamp((bp-b.revealStart)/(b.revealEnd-b.revealStart),0,1);
    if(ba<=0) continue;
    var g=ctx.createLinearGradient(b.x1,b.y1,b.x2,b.y2);
    g.addColorStop(0,b.depth===0?'#5a2a0a':'#4a2008');
    g.addColorStop(1,b.depth===0?'#8c5020':'#6e3810');
    ctx.save();ctx.globalAlpha=ba;
    ctx.beginPath();ctx.moveTo(b.x1,b.y1);ctx.lineTo(b.x2,b.y2);
    ctx.strokeStyle=g;
    ctx.lineWidth=Math.max(1,(7-b.depth)*2.2*(Math.min(W,H)/800));
    ctx.lineCap='round';ctx.stroke();ctx.restore();
  }

  // ── LEAVES ────────────────────────────────────────────────────────────────────
  for(var li=0;li<leaves.length;li++){
    var lf=leaves[li];
    var la=clamp((bp-lf.revealStart)/0.12,0,1);
    if(la<=0) continue;
    var sway=Math.sin(frame*0.038*lf.swaySpeed+lf.phase)*lf.swayAmp;
    var ox=Math.sin(frame*0.022*lf.swaySpeed+lf.phase)*lf.swayAmp*0.35;
    var oy=Math.cos(frame*0.022*lf.swaySpeed+lf.phase)*lf.swayAmp*0.18;
    var isActive=(li===activeLeafIdx);
    var lit=isActive?65:42+Math.sin(frame*0.03+lf.phase)*6;
    var sat=isActive?90:72;
    heart(lf.cx+ox, lf.cy+oy, lf.baseAngle-90+sway,
      lf.size, 'hsl('+lf.hue+','+sat+'%,'+lit+'%)', la);

    // Active: photo floats above leaf, centered
    if(isActive&&activePhoto){
      showTimer++;
      if(activeAlpha<1) activeAlpha=Math.min(1,activeAlpha+0.045);
      if(showTimer>SHOW_DUR) activeAlpha=Math.max(0,activeAlpha-0.030);
      if(showTimer>SHOW_DUR+40){activePhoto=null;activeAlpha=0;setTimeout(scheduleNext,1000);}
      if(activeAlpha>0){
        var pw=clamp(Math.min(W,H)*0.19,70,190);
        // Center above the leaf — ensure it stays on screen
        var ppx=clamp(lf.cx+ox-pw/2, 10, W-pw-10);
        var ppy=clamp(lf.cy+oy-lf.size*2-pw-10, 10, H-pw-10);
        // Glow ring
        ctx.save();ctx.globalAlpha=activeAlpha*0.55;
        ctx.fillStyle='#e91e8c';ctx.shadowColor='#e91e8c';ctx.shadowBlur=35;
        rr(ppx-5,ppy-5,pw+10,pw+10,16);ctx.fill();ctx.restore();
        // Photo
        ctx.save();ctx.globalAlpha=activeAlpha;
        rr(ppx,ppy,pw,pw,12);ctx.clip();
        ctx.drawImage(activePhoto,ppx,ppy,pw,pw);ctx.restore();
        // Border
        ctx.save();ctx.globalAlpha=activeAlpha;
        rr(ppx,ppy,pw,pw,12);
        ctx.strokeStyle='#f48fb1';ctx.lineWidth=2.5;ctx.stroke();ctx.restore();
        // Connector line leaf→photo
        ctx.save();ctx.globalAlpha=activeAlpha*0.4;
        ctx.beginPath();
        ctx.moveTo(lf.cx+ox, lf.cy+oy-lf.size);
        ctx.lineTo(ppx+pw/2, ppy+pw);
        ctx.strokeStyle='#f48fb1';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
        ctx.stroke();ctx.setLineDash([]);ctx.restore();
      }
    }
  }

  // Burst + light
  updateBurst();drawBurst();
  drawLight();

  // Schedule first leaf once tree is visible
  if(!firstLeafScheduled && bp>0.62 && leaves.length>0 && PHOTOS.length>0){
    firstLeafScheduled=true;
    setTimeout(scheduleNext,700);
  }
}
animate();

// Click leaf → full screen photo
canvas.addEventListener('click',function(e){
  var mx=e.clientX,my=e.clientY;
  for(var i=0;i<leaves.length;i++){
    var lf=leaves[i];
    var dx=mx-lf.cx,dy=my-lf.cy;
    if(Math.sqrt(dx*dx+dy*dy)<lf.size*3){
      var p=photoQueue[(qIdx+i)%photoQueue.length];
      document.getElementById('modalImg').src=PHOTOS[p];
      document.getElementById('photoModal').classList.add('show');
      break;
    }
  }
});

} catch(err) {
  var b=document.body;
  b.style.cssText='background:#0a0008;color:#f48fb1;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;text-align:center;padding:2rem;flex-direction:column;gap:1rem;';
  b.innerHTML='<div style="font-size:2rem">🌹</div><div>'+err.message+'</div>';
}
})();
</script>
