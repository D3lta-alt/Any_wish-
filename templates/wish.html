<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0008;}
#mainCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;}
#photoModal{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.88);align-items:center;justify-content:center;
  backdrop-filter:blur(14px);cursor:pointer;
}
#photoModal.show{display:flex;}
#photoModal img{
  max-width:min(90vw,700px);max-height:88vh;
  border-radius:20px;border:2px solid #c9185b;
  box-shadow:0 0 80px rgba(201,24,91,.7);
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<canvas id="mainCanvas"></canvas>
<div id="photoModal" onclick="this.classList.remove('show')">
  <img id="modalImg" src="" alt="Memory"/>
</div>
<script>
try {
const PHOTOS    = {{ photos_json|safe }};
const MESSAGE   = {{ message|tojson }};
const RECIPIENT = {{ recipient|tojson }};

const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');

let W, H, ROOT_X, ROOT_Y, TRUNK_L, TITLE_Y, SUB_Y;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ROOT_X  = W / 2;
  ROOT_Y  = H * 0.76;
  TRUNK_L = Math.min(H * 0.23, W * 0.26);
  TITLE_Y = H * 0.08;
  SUB_Y   = H * 0.14;
  treeBuilt = false;
}
resize();
window.addEventListener('resize', function(){ resize(); buildTree(); });

const rand  = function(a,b){ return a+Math.random()*(b-a); };
const lerp  = function(a,b,t){ return a+(b-a)*t; };
const clamp = function(v,a,b){ return Math.max(a,Math.min(b,v)); };

// Rounded rect polyfill
function roundRect(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── Dust ─────────────────────────────────────────────────────────────────────
function Dust(){ this.reset(true); }
Dust.prototype.reset = function(init){
  this.x  = rand(0,W);
  this.y  = init ? rand(-H,0) : rand(-60,-5);
  this.vy = rand(0.3,1.6);
  this.vx = rand(-0.3,0.3);
  this.r  = rand(1,3);
  this.a  = rand(0.35,0.9);
  this.hue= rand(290,360);
  this.settled=false;
  this.settleY=rand(H*0.05,H*0.98);
  this.life=1;
};
Dust.prototype.update = function(){
  if(this.settled){ this.life-=0.007; return; }
  this.x += this.vx + Math.sin(this.y*0.018)*0.25;
  this.y += this.vy;
  if(this.y>this.settleY) this.settled=true;
};
Dust.prototype.draw = function(){
  ctx.save();
  ctx.globalAlpha = this.settled ? this.a*this.life : this.a*0.65;
  ctx.beginPath();
  ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
  var col='hsl('+this.hue+',80%,72%)';
  ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=5;
  ctx.fill(); ctx.restore();
};

var dusts=[];
for(var di=0;di<280;di++) dusts.push(new Dust());

// ── Build progress ────────────────────────────────────────────────────────────
var buildProgress=0;
var BUILD_SPEED=0.0022;

// ── Tree data ─────────────────────────────────────────────────────────────────
var branches=[], leaves=[], roots=[];
var treeBuilt=false;

var nameWords = RECIPIENT ? ['Happy','Birthday',RECIPIENT] : ['Happy','Birthday'];
var msgWords  = MESSAGE.trim() ? MESSAGE.trim().split(/\s+/).slice(0,17) : [];
var words     = nameWords.concat(msgWords).slice(0,20);

function buildTree(){
  branches.length=0; leaves.length=0; roots.length=0;
  var MAX_D=6;

  function grow(x,y,angle,len,depth){
    if(depth>MAX_D||len<6) return;
    var rad=angle*Math.PI/180;
    var x2=x+Math.cos(rad)*len;
    var y2=y-Math.sin(rad)*len;
    branches.push({x1:x,y1:y,x2:x2,y2:y2,depth:depth,revealAt:depth/(MAX_D+1)});
    if(depth===MAX_D){
      leaves.push({
        cx:x2,cy:y2,baseAngle:angle,
        phase:rand(0,Math.PI*2),
        size:Math.min(W,H)*0.028+rand(0,Math.min(W,H)*0.01),
        swayAmp:rand(4,11),swaySpeed:rand(0.5,1.3),
        revealAt:0.68+rand(0,0.28),
      });
      return;
    }
    var spread=lerp(30,15,depth/MAX_D);
    var lm=rand(0.68,0.78);
    grow(x2,y2,angle+spread,len*lm,depth+1);
    grow(x2,y2,angle-spread,len*lm,depth+1);
    if(depth<3) grow(x2,y2,angle+spread*0.35,len*lm*0.82,depth+2);
  }

  grow(ROOT_X,ROOT_Y,90,TRUNK_L,0);
  for(var i=0;i<5;i++){
    var by=ROOT_Y-TRUNK_L*(0.35+Math.random()*0.35);
    var side=Math.random()<.5?1:-1;
    grow(ROOT_X,by,90+side*rand(22,48),TRUNK_L*rand(0.22,0.36),3);
  }

  // Build roots — correct word order
  var rootBaseY = ROOT_Y + H*0.012;
  var leftWords=[], rightWords=[];
  for(var wi=0;wi<words.length;wi++){
    if(wi%2===0) leftWords.push(words[wi]);
    else rightWords.push(words[wi]);
  }

  var ordered=[];
  var maxLen=Math.max(leftWords.length,rightWords.length);
  for(var oi=0;oi<maxLen;oi++){
    if(oi<leftWords.length)  ordered.push({w:leftWords[oi], side:-1, rank:oi});
    if(oi<rightWords.length) ordered.push({w:rightWords[oi],side:1,  rank:oi});
  }

  var halfW=W*0.40;
  ordered.forEach(function(item,idx){
    var spread=halfW/(Math.max(leftWords.length,rightWords.length)+0.5);
    var ex=ROOT_X+item.side*(spread*(item.rank+1));
    var ey=rootBaseY+H*0.09+(item.rank%3)*H*0.022;
    roots.push({
      word:item.w, sx:ROOT_X, sy:rootBaseY, ex:ex, ey:ey,
      cx1:ROOT_X+(ex-ROOT_X)*0.25+Math.sin(idx*1.7)*W*0.04,
      cy1:rootBaseY+H*0.035,
      cx2:ROOT_X+(ex-ROOT_X)*0.75+Math.cos(idx*2.1)*W*0.035,
      cy2:ey-H*0.015,
      progress:0, speed:0.003+rand(0,0.002),
      done:false, alpha:0, delay:idx*50, revealAt:0.82,
    });
  });

  treeBuilt=true;
}
buildTree();

// Bezier
function bezPt(r,t){
  var mt=1-t;
  return {
    x:mt*mt*mt*r.sx+3*mt*mt*t*r.cx1+3*mt*t*t*r.cx2+t*t*t*r.ex,
    y:mt*mt*mt*r.sy+3*mt*mt*t*r.cy1+3*mt*t*t*r.cy2+t*t*t*r.ey,
  };
}

// Photo cycling
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}}
var photoQueue=[];
for(var pi=0;pi<PHOTOS.length;pi++) photoQueue.push(pi);
shuffle(photoQueue);
var qIdx=0;
var activeLeafIdx=-1, activePhoto=null, activeAlpha=0, showTimer=0;
var SHOW_DUR=200;

// Light beam
var lightBeam=null;
function triggerLight(leafIdx,onDone){
  if(!leaves[leafIdx]){onDone();return;}
  var lf=leaves[leafIdx];
  var path=[
    {x:ROOT_X,y:ROOT_Y+H*0.03},
    {x:ROOT_X,y:ROOT_Y},
    {x:lerp(ROOT_X,lf.cx,0.35),y:lerp(ROOT_Y,lf.cy,0.35)},
    {x:lerp(ROOT_X,lf.cx,0.7),y:lerp(ROOT_Y,lf.cy,0.7)},
    {x:lf.cx,y:lf.cy},
  ];
  lightBeam={path:path,t:0,speed:0.02,onDone:onDone};
}
function getLightPos(path,t){
  var total=path.length-1;
  var seg=clamp(t*total,0,total-0.001);
  var i=Math.floor(seg),f=seg-i;
  return {x:lerp(path[i].x,path[i+1].x,f),y:lerp(path[i].y,path[i+1].y,f)};
}
function drawLight(){
  if(!lightBeam) return;
  lightBeam.t+=lightBeam.speed;
  if(lightBeam.t>=1){var cb=lightBeam.onDone;lightBeam=null;cb();return;}
  for(var ti=0;ti<10;ti++){
    var tt=Math.max(0,lightBeam.t-ti*0.016);
    var tp=getLightPos(lightBeam.path,tt);
    ctx.save();ctx.globalAlpha=(1-ti/10)*0.75*buildProgress;
    ctx.beginPath();ctx.arc(tp.x,tp.y,4.5-ti*0.4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.shadowColor='#ffaadd';ctx.shadowBlur=18;
    ctx.fill();ctx.restore();
  }
  var pos=getLightPos(lightBeam.path,lightBeam.t);
  ctx.save();ctx.globalAlpha=buildProgress;
  ctx.beginPath();ctx.arc(pos.x,pos.y,7,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.shadowColor='#ffccff';ctx.shadowBlur=30;
  ctx.fill();ctx.restore();
}

function scheduleNext(){
  if(!leaves.length||!PHOTOS.length) return;
  activeLeafIdx=Math.floor(Math.random()*leaves.length);
  var pIdx=photoQueue[qIdx%photoQueue.length];
  qIdx++;
  if(qIdx%photoQueue.length===0) shuffle(photoQueue);
  triggerLight(activeLeafIdx,function(){
    var img=new Image();
    img.src=PHOTOS[pIdx];
    img.onload=function(){activePhoto=img;activeAlpha=0;showTimer=0;};
  });
}

// Heart
function drawHeart(cx,cy,angle,s,col,alpha){
  ctx.save();ctx.globalAlpha=alpha||1;
  ctx.translate(cx,cy);ctx.rotate(angle*Math.PI/180);
  ctx.beginPath();
  ctx.moveTo(0,-s*0.5);
  ctx.bezierCurveTo(s*0.8,-s*1.2,s*1.6,s*0.3,0,s*1.0);
  ctx.bezierCurveTo(-s*1.6,s*0.3,-s*0.8,-s*1.2,0,-s*0.5);
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=10;
  ctx.fill();ctx.restore();
}

function titleSize(){ return clamp(W*0.038,18,52); }
function subSize(){   return clamp(W*0.021,12,26); }
function rootSize(){  return clamp(W*0.019,10,22); }

var frame=0, rootFrame=0, firstLeaf=false;
var romanticHues=[340,355,320,350,308,335,345];

function animate(){
  requestAnimationFrame(animate);
  frame++;
  buildProgress=clamp(buildProgress+BUILD_SPEED,0,1);
  var bp=buildProgress;

  ctx.fillStyle='#0a0008';ctx.fillRect(0,0,W,H);

  // Dust
  for(var di=0;di<dusts.length;di++){
    dusts[di].update();dusts[di].draw();
    if(dusts[di].settled&&dusts[di].life<=0) dusts[di].reset(false);
    if(!dusts[di].settled&&dusts[di].y>H+10) dusts[di].reset(false);
  }

  // Title
  var ta=clamp((bp-0.08)/0.3,0,1);
  if(ta>0){
    ctx.save();ctx.globalAlpha=ta;ctx.textAlign='center';
    var title='✦ Happy Birthday'+(RECIPIENT?' '+RECIPIENT:' To You')+' ✦';
    ctx.font='bold '+titleSize()+'px Cinzel,serif';
    ctx.fillStyle='#d4a853';ctx.shadowColor='#d4a853';
    ctx.shadowBlur=25+Math.sin(frame*0.03)*12;
    var mw=ctx.measureText(title).width;
    if(mw>W*0.88){
      var sp=title.lastIndexOf(' ',Math.ceil(title.length/2));
      var l1=title.slice(0,sp),l2=title.slice(sp+1);
      var lh=titleSize()*1.3;
      ctx.fillText(l1,W/2,TITLE_Y);
      ctx.fillText(l2,W/2,TITLE_Y+lh);
    } else {
      ctx.fillText(title,W/2,TITLE_Y);
    }
    ctx.shadowBlur=0;
    ctx.font='italic '+subSize()+'px "Dancing Script",cursive';
    ctx.fillStyle='#f48fb1';ctx.shadowColor='#f48fb1';ctx.shadowBlur=8;
    ctx.fillText('A little magic, grown just for you \u{1F339}',W/2,SUB_Y);
    ctx.restore();
  }

  // Roots
  if(bp>0.80){
    rootFrame++;
    for(var ri=0;ri<roots.length;ri++){
      var r=roots[ri];
      if(rootFrame<r.delay) continue;
      var la=clamp((bp-r.revealAt)/(1-r.revealAt),0,1);
      if(!r.done) r.progress=Math.min(1,r.progress+r.speed);
      if(r.progress>=1) r.done=true;
      var t=r.progress*la;
      ctx.save();ctx.globalAlpha=la;
      ctx.beginPath();ctx.moveTo(r.sx,r.sy);
      for(var s=1;s<=40;s++){var pt=bezPt(r,(s/40)*t);ctx.lineTo(pt.x,pt.y);}
      ctx.strokeStyle='#7a4020';
      ctx.lineWidth=Math.max(1.5,3.5*(Math.min(W,H)/700));
      ctx.lineCap='round';ctx.stroke();ctx.restore();
      if(r.progress>0.9){
        r.alpha=Math.min(1,(r.progress-0.9)/0.1)*la;
        var ep=bezPt(r,1);
        ctx.save();ctx.globalAlpha=r.alpha;
        ctx.font='italic '+rootSize()+'px "Dancing Script",cursive';
        ctx.fillStyle='#f5c842';ctx.textAlign='center';
        ctx.shadowColor='rgba(212,168,83,.9)';ctx.shadowBlur=10;
        ctx.fillText(r.word,ep.x,ep.y+5);ctx.restore();
      }
    }
  }

  // Branches
  for(var bi=0;bi<branches.length;bi++){
    var b=branches[bi];
    var ba=clamp((bp-b.revealAt*0.55)/0.25,0,1);
    if(ba<=0) continue;
    var grad=ctx.createLinearGradient(b.x1,b.y1,b.x2,b.y2);
    grad.addColorStop(0,b.depth===0?'#4a2008':'#3b1800');
    grad.addColorStop(1,b.depth===0?'#7a4020':'#5c2a0e');
    ctx.save();ctx.globalAlpha=ba;
    ctx.beginPath();ctx.moveTo(b.x1,b.y1);ctx.lineTo(b.x2,b.y2);
    ctx.strokeStyle=grad;
    ctx.lineWidth=Math.max(1,(7-b.depth)*2*(Math.min(W,H)/700));
    ctx.lineCap='round';ctx.stroke();ctx.restore();
  }

  // Leaves
  for(var li=0;li<leaves.length;li++){
    var lf=leaves[li];
    var la2=clamp((bp-lf.revealAt)/0.15,0,1);
    if(la2<=0) continue;
    var sway=Math.sin(frame*0.04*lf.swaySpeed+lf.phase)*lf.swayAmp;
    var sx=Math.sin(frame*0.025*lf.swaySpeed+lf.phase)*lf.swayAmp*0.3;
    var sy2=Math.cos(frame*0.025*lf.swaySpeed+lf.phase)*lf.swayAmp*0.15;
    var isActive=(li===activeLeafIdx);
    var hue=isActive?330+Math.sin(frame*0.05)*15:romanticHues[li%romanticHues.length];
    var lit=isActive?62:40+Math.sin(frame*0.03+lf.phase)*5;
    drawHeart(lf.cx+sx,lf.cy+sy2,lf.baseAngle-90+sway,lf.size,
      'hsl('+hue+',75%,'+lit+'%)',la2);

    if(isActive&&activePhoto){
      showTimer++;
      if(activeAlpha<1) activeAlpha=Math.min(1,activeAlpha+0.04);
      if(showTimer>SHOW_DUR) activeAlpha=Math.max(0,activeAlpha-0.032);
      if(showTimer>SHOW_DUR+35){activePhoto=null;activeAlpha=0;setTimeout(scheduleNext,900);}
      if(activeAlpha>0){
        var pw=clamp(Math.min(W,H)*0.2,80,200);
        var px=lf.cx+sx-pw/2, py2=lf.cy+sy2-lf.size*2.5-pw;
        // Glow
        ctx.save();ctx.globalAlpha=activeAlpha*0.5;
        ctx.fillStyle='#c9185b';ctx.shadowColor='#c9185b';ctx.shadowBlur=28;
        roundRect(px-4,py2-4,pw+8,pw+8,14);ctx.fill();ctx.restore();
        // Photo
        ctx.save();ctx.globalAlpha=activeAlpha;
        roundRect(px,py2,pw,pw,11);ctx.clip();
        ctx.drawImage(activePhoto,px,py2,pw,pw);ctx.restore();
        // Border
        ctx.save();ctx.globalAlpha=activeAlpha;
        roundRect(px,py2,pw,pw,11);
        ctx.strokeStyle='#f48fb1';ctx.lineWidth=2;ctx.stroke();ctx.restore();
      }
    }
  }

  drawLight();

  if(!firstLeaf&&bp>0.96&&leaves.length>0&&PHOTOS.length>0){
    firstLeaf=true;setTimeout(scheduleNext,600);
  }
}
animate();

canvas.addEventListener('click',function(e){
  var mx=e.clientX,my=e.clientY;
  for(var i=0;i<leaves.length;i++){
    var lf=leaves[i];
    var dx=mx-lf.cx,dy=my-lf.cy;
    if(Math.sqrt(dx*dx+dy*dy)<lf.size*2.8){
      var p=photoQueue[(qIdx+i)%photoQueue.length];
      document.getElementById('modalImg').src=PHOTOS[p];
      document.getElementById('photoModal').classList.add('show');
      break;
    }
  }
});

} catch(e) {
  document.body.style.cssText='background:#1a0010;color:#f48fb1;display:flex;align-items:center;justify-content:center;height:100vh;font-family:serif;font-size:1.2rem;text-align:center;padding:2rem;';
  document.body.innerHTML='<div>🌹 Something went wrong<br><small style="opacity:.6">'+e.message+'</small></div>';
}
</script>
</body>
</html>
